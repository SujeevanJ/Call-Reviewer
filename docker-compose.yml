version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: call_reviewer_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: call_reviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d call_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: call_reviewer_app
    restart: always
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_password@postgres:5432/call_reviewer?schema=public
      - AWS_REGION=${AWS_REGION:-}
      - SECRET_NAME=call-reviewer/production
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount the local audio-registry.json to persist audio paths if doing local injection
      - ./audio-registry.json:/app/audio-registry.json
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-group: /call-reviewer/production
        awslogs-stream: web-app
        awslogs-create-group: "true"

  nginx:
    image: nginx:alpine
    container_name: call_reviewer_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-group: /call-reviewer/production
        awslogs-stream: nginx
        awslogs-create-group: "true"

volumes:
  postgres_data:
